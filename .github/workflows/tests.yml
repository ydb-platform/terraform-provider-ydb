name: tests
on:
  push:
    branches:
      - main
      - release-*
  pull_request:
  workflow_dispatch:
jobs:
  unit:
    concurrency:
      group: unit-${{ github.ref }}-${{ matrix.os }}-${{ matrix.go-version }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.25.x, 1.26.x]
        os: [ubuntu, windows, macOS]
    env:
      OS: ${{ matrix.os }}-latest
      GO: ${{ matrix.go-version }}
    runs-on: ${{ matrix.os }}-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install Go
        uses: actions/setup-go@v3
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Test
        run: go test -race -coverprofile unit.txt -covermode atomic ./...
      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./unit.txt
          flags: unit,${{ matrix.os }},go-${{ matrix.go-version }}
          name: unit

  # Acceptance tests: YDB runs as a GitHub Actions service container (same pattern as Postgres/Redis
  # in the docs). Terraform CLI comes from hashicorp/setup-terraform; readiness uses iFaxity/wait-on-action (TCP).
  acceptance:
    name: acceptance (YDB in Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      ydb:
        image: ydbplatform/local-ydb:latest
        env:
          YDB_FEATURE_FLAGS: enable_external_data_sources
        ports:
          - 2136:2136
    env:
      TF_ACC: "1"
      YDB_ACC_CONNECTION_STRING: grpc://127.0.0.1:2136/?database=/local
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false
      - name: Wait for YDB gRPC
        uses: iFaxity/wait-on-action@v1.2.1
        with:
          resource: tcp:127.0.0.1:2136
          timeout: 180000
          interval: 2000
          log: true
      - name: Acceptance tests
        run: go test -v -timeout 30m ./internal/terraform/ -run TestAcc

